services:
  # ── Express Search Backend ──────────────────────────────────────────────────
  - type: web
    name: trace-backend
    runtime: node
    # Render builds from the repo root; rootDir scopes the build context.
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        # Set this in the Render dashboard → Environment → DATABASE_URL
        sync: false
      # Tell Puppeteer to skip downloading Chromium (Render provides it via apt)
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      # Render's built-in Chromium path on its Linux image
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable

# ── Keep-alive cron (prevents free-tier sleep after 15 min inactivity) ────────
crons:
  - name: keep-backend-alive
    schedule: "*/14 * * * *"
    # Pings the actual deployment URL to prevent sleep
    command: "curl -fs https://tracesearchengine.onrender.com/health || true"
